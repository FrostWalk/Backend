services:
  postgres:
    image: postgres:alpine
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
    - db_data:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=password
      - TZ=Europe/Rome
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      - TZ=Europe/Rome
    restart: unless-stopped

volumes:
  db_data:
